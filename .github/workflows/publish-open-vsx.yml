name: Publish Open VSX

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish-open-vsx:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore bundled tokenizer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force tokenizer | Out-Null
          Invoke-WebRequest -Uri "https://huggingface.co/Xenova/gpt2/resolve/main/tokenizer.json" -OutFile "tokenizer/tokenizer.json"
          Invoke-WebRequest -Uri "https://huggingface.co/Xenova/gpt2/resolve/main/tokenizer_config.json" -OutFile "tokenizer/tokenizer_config.json"

      - name: Verify
        run: |
          npm run compile
          npm test
          npm run lint

      - name: Ensure Open VSX namespace exists
        continue-on-error: true
        run: npx ovsx create-namespace local-token-visualizer -p $env:OVSX_PAT
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Publish to Open VSX
        run: npx ovsx publish -p $env:OVSX_PAT
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
